version: "3.8"

services:
  db:
    image: ankane/pgvector
    container_name: rag_postgres_fresh
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    ports:
      - "55432:5432"
    volumes:
      - rag_postgres_fresh_data:/var/lib/postgresql/data

volumes:
  rag_postgres_fresh_data: